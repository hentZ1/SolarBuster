name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_run:
    workflows: ["Rust"]
    types: [completed]
    branches: ["main"]

jobs:
  build:
    name: Build & Upload Artifacts
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: SolarBuster
            asset_name: SolarBuster-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: SolarBuster.exe
            asset_name: SolarBuster-windows-x86_64.exe
          - os: macos-14
            target: x86_64-apple-darwin
            artifact_name: SolarBuster
            asset_name: SolarBuster-macos-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: SolarBuster
            asset_name: SolarBuster-macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Target
        run: rustup target add ${{ matrix.target }}

      - name: Build Release Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary to asset name
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get next version tag
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            TAG_COUNT=$(gh api repos/${{ github.repository }}/tags --paginate --jq '.[].name' | wc -l)
            NEXT_VERSION=$((TAG_COUNT + 1))
            echo "tag=v${NEXT_VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: artifacts/**/*
